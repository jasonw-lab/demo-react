  # Backend service (API)
  photo-gallary:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:123456@host.docker.internal:3306/lab_front
      - MINIO_ENDPOINT=host.docker.internal
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=photos
      - MINIO_PUBLIC_URL=http://host.docker.internal:9000
      - NEXT_BASEPATH=/photo-gallary
    extra_hosts:
      - "host.docker.internal:host-gateway"
